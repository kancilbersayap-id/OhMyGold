name: Daily Galeri24 Retail Price Scrape

on:
  schedule:
    # GitHub cron is unreliable (silent skips, large delays), so retry hourly
    # from 10:20 to 17:20 Jakarta (03:20 to 10:20 UTC). Upsert makes reruns no-op.
    - cron: '20 3,4,5,6,7,8,9,10 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Check if today's prices already scraped
        id: check-prices
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ADMIN_KEY: ${{ secrets.SUPABASE_ADMIN_KEY }}
        run: node scripts/check-retail-prices-today.js || echo "needs_scrape=true" >> $GITHUB_OUTPUT

      - name: Run retail price scraper
        if: steps.check-prices.outputs.needs_scrape == 'true'
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ADMIN_KEY: ${{ secrets.SUPABASE_ADMIN_KEY }}
        run: node scripts/scrape-retail-prices.js

      - name: Commit results (if changed)
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update retail prices" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
