name: Daily Logammulia Scrape

on:
  schedule:
    # Logam Mulia publishes mid-morning Jakarta. GitHub cron is unreliable
    # (silent skips, large delays), so retry hourly from 14:00 to 21:00 Jakarta
    # (07:00 to 14:00 UTC). Upsert on (user_id,date) makes reruns no-op.
    - cron: '0 7,8,9,10,11,12,13,14 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Run scraper
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ADMIN_KEY: ${{ secrets.SUPABASE_ADMIN_KEY }}
          SUPABASE_USER_ID: ${{ secrets.SUPABASE_USER_ID }}
        run: |
          echo "$SUPABASE_USER_ID" | node scripts/scrape-buyback-history.js

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logammulia-debug-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            logammulia-screenshot.png
            logammulia-page.html
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit results (if changed)
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update buyback prices" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
